spring.application.name=rpg

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
api.security.token.secret=123
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.security.user.name=${ADMIN_NAME}
spring.security.user.password=${ADMIN_PASSWORD}

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}
logging.level.org.springframework.security=DEBUG

app.frontend-url=${FRONTEND_URL:http://localhost:5173}


gmail.client-id=${GMAIL_CLIENT_ID}
gmail.client-secret=${GMAIL_CLIENT_SECRET}
gmail.refresh-token=${GMAIL_REFRESH_TOKEN}
gmail.sender=institutoeleonora@gmail.com

spring.cache.type=redis
spring.data.redis.url=${REDIS_URL}
spring.cache.redis.time-to-live=600000
